# espanso typo corrections
# Common English typing mistakes auto-corrected on word boundary.
matches:
  # --- Articles & conjunctions ---
  - trigger: "teh"
    word: true
    replace: "the"

  - trigger: "adn"
    word: true
    replace: "and"

  - trigger: "nto"
    word: true
    replace: "not"

  - trigger: "hte"
    word: true
    replace: "the"

  - trigger: "fo"
    word: true
    replace: "of"

  # --- Common short words ---
  - trigger: "taht"
    word: true
    replace: "that"

  - trigger: "waht"
    word: true
    replace: "what"

  - trigger: "thsi"
    word: true
    replace: "this"

  - trigger: "yuo"
    word: true
    replace: "you"

  - trigger: "ahve"
    word: true
