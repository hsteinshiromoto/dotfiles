matches:
  - trigger: "[[today]]"
    word: true
    replace: "[[{{output}}|today]]"
    vars:
      - name: output
        type: shell
        params:
          cmd: "echo `date \"+%Y-%m-%d\"`"


  - trigger: "[[yesterday]]"
    word: true
    replace: "[[{{output}}|yesterday]]"
    vars:
      - name: output
        type: shell
        params:
          cmd: "echo `date -v -1d \"+%Y-%m-%d\"`"

  - trigger: "[[tomorrow]]"
    word: true
    replace: "[[{{output}}|tomorrow]]"
    vars:
      - name: output
        type: shell
        params:
          cmd: "echo `date -v +1d \"+%Y-%m-%d\"`"

  - trigger: "[[next monday]]"
