- name: Bootstrap development environment
  hosts: localhost

  tasks:
  - name: Install packages with apt
    become: yes
    ansible.builtin.apt:
      name:
        - "autoconf"
        - "ca-certificates"
        - "gcc"
        - "btop"
        - "git"
        - "git-flow-avh"
        - "cloudflared"
        - "docker"
        - "docker-compose"
        - "espanso"
        - "exa"
        - "fzf"
        - "kitty"
        - "pinentry"
        - "pyenv"
        - "stow"
        - "syncthing"
        - "texlive"
        - "tmux"
        - "tree"
        - "wget"
        - "zoxide"
        - "zsh"
        - "zsh-autosuggestions"
        - "zsh-completions"
        - "zsh-syntax-highlighting"
      state: present
    when: ansible_distribution == "Ubuntu"

  - name: Install packages from Brewfile
    become: yes
    ansible.builtin.shell: brew bundle
    when: ansible_distribution == "MacOSX"


