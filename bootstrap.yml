- name: Bootstrap development environment
  hosts: localhost
  gather_facts: yes
  
  tasks:
    - name: Install packages
      # become: yes
      ansible.builtin.package:
        name:
          - "btop"
          - "git"
          - "git-flow"
          - "cloudflared"
          - "docker"
          - "espanso"
          - "exa"
          - "fzf"
          - "kitty"
          - "stow"
          - "tmux"
          - "wget"
          - "zoxide"
          - "zsh"
          - "zsh-autosuggestions"
          - "zsh-completions"
          - "zsh-syntax-highlighting"
        state: "present"
  


